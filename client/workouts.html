<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренировки - Калистеника трекер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="user-info" id="userInfo"></div>
        
        <div class="menu">
            <a href="workouts.html">📋 Тренировки</a>
            <a href="users.html">👥 Пользователи</a>
            <a href="exercises.html">🏋️ Упражнения</a>
            <a href="sets.html">📊 Подходы</a>
            <button onclick="logout()">🚪 Выход</button>
        </div>

        <div class="inline-buttons">
            <button onclick="showAddForm()">➕ Добавить тренировку</button>
        </div>

        <div id="workoutsList"></div>
        <div id="formContainer" class="form-card hidden"></div>
    </div>

    <script src="script.js"></script>
    <script>
        const API_URL = 'http://localhost/CalisthenicsAPI/server/index.php';

        function checkAuth() {
            if (!localStorage.getItem('user_id')) {
                window.location.href = 'index.html';
            }
        }

        function updateUserInfo() {
            document.getElementById('userInfo').innerHTML = `👋 ${localStorage.getItem('username')} | ${localStorage.getItem('role') === 'admin' ? 'Админ' : 'Пользователь'}`;
        }

        async function loadWorkouts() {
            try {
                const response = await fetch(`${API_URL}/workouts`);
                const data = await response.json();
                const container = document.getElementById('workoutsList');
                
                if (data.status && data.data.length) {
                    let html = `<h2>📋 Мои тренировки</h2>`;
                    html += `<table>`;
                    html += `<tr><th>ID</th><th>Дата</th><th>Длительность</th><th>Заметки</th><th>Действия</th></tr>`;
                    data.data.forEach(w => {
                        html += `<tr>
                            <td data-label="ID">${w.id}</td>
                            <td data-label="Дата">${w.workout_date}</td>
                            <td data-label="Длительность">${w.duration_minutes} мин</td>
                            <td data-label="Заметки">${w.notes || '-'}</td>
                            <td data-label="Действия">
                                <button onclick="viewWorkout(${w.id})">👁️</button>
                                <button onclick="editWorkout(${w.id})">✏️</button>
                                <button onclick="deleteWorkout(${w.id})" class="delete">🗑️</button>
                            </td>
                        </tr>`;
                    });
                    html += `</table>`;
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<p>Нет тренировок. Добавьте первую!</p>';
                }
            } catch(e) {
                document.getElementById('workoutsList').innerHTML = '<p class="error">Ошибка загрузки</p>';
            }
        }

        function showAddForm() {
            document.getElementById('formContainer').innerHTML = `
                <h3>➕ Новая тренировка</h3>
                <input type="date" id="workDate" value="${new Date().toISOString().slice(0,10)}">
                <input type="number" id="workDuration" placeholder="Длительность (мин)">
                <textarea id="workNotes" placeholder="Заметки"></textarea>
                <div class="inline-buttons">
                    <button onclick="saveWorkout(null)">💾 Сохранить</button>
                    <button onclick="cancelForm()" class="secondary">Отмена</button>
                </div>
            `;
            document.getElementById('formContainer').classList.remove('hidden');
        }

        async function editWorkout(id) {
            const response = await fetch(`${API_URL}/workouts/${id}`);
            const data = await response.json();
            if (data.status) {
                const w = data.data;
                document.getElementById('formContainer').innerHTML = `
                    <h3>✏️ Редактировать тренировку #${id}</h3>
                    <input type="date" id="workDate" value="${w.workout_date}">
                    <input type="number" id="workDuration" value="${w.duration_minutes}" placeholder="Длительность (мин)">
                    <textarea id="workNotes" placeholder="Заметки">${w.notes || ''}</textarea>
                    <div class="inline-buttons">
                        <button onclick="saveWorkout(${id})">💾 Обновить</button>
                        <button onclick="cancelForm()" class="secondary">Отмена</button>
                    </div>
                `;
                document.getElementById('formContainer').classList.remove('hidden');
            }
        }

        async function saveWorkout(id) {
            const date = document.getElementById('workDate').value;
            const duration = document.getElementById('workDuration').value;
            const notes = document.getElementById('workNotes').value;

            if (!date || !duration) {
                alert('Заполните дату и длительность');
                return;
            }

            if (id) {
                await fetch(`${API_URL}/workouts/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ workout_date: date, duration: duration, notes: notes })
                });
                alert(' Тренировка обновлена');
            } else {
                const formData = new URLSearchParams();
                formData.append('user_id', localStorage.getItem('user_id'));
                formData.append('workout_date', date);
                formData.append('duration', duration);
                formData.append('notes', notes);
                await fetch(`${API_URL}/workouts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                alert(' Тренировка добавлена');
            }
            cancelForm();
            loadWorkouts();
        }

        function cancelForm() {
            document.getElementById('formContainer').classList.add('hidden');
        }

        async function viewWorkout(id) {
            const res = await fetch(`${API_URL}/workouts/${id}`);
            const data = await res.json();
            if (data.status) {
                const w = data.data;
                const setsRes = await fetch(`${API_URL}/sets/${id}`);
                const setsData = await setsRes.json();
                let setsHtml = '<h4>Подходы</h4>';
                if (setsData.status && setsData.data.length) {
                    setsHtml += `<table><tr><th>Подход</th><th>Упражнение</th><th>Повторения</th><th>Вес</th></tr>`;
                    setsData.data.forEach(s => {
                        setsHtml += `<tr><td>${s.set_order}</td><td>${s.exercise_name}</td><td>${s.repetitions}</td><td>${s.added_weight_kg} кг</td></tr>`;
                    });
                    setsHtml += `</table>`;
                } else {
                    setsHtml += '<p>Нет подходов</p>';
                }
                document.getElementById('workoutsList').innerHTML = `
                    <div class="view-card">
                        <h3>Тренировка #${w.id}</h3>
                        <p><strong>Дата:</strong> ${w.workout_date}</p>
                        <p><strong>Длительность:</strong> ${w.duration_minutes} мин</p>
                        <p><strong>Заметки:</strong> ${w.notes || '-'}</p>
                        ${setsHtml}
                        <div class="inline-buttons"><button onclick="loadWorkouts()">◀ Назад</button></div>
                    </div>
                `;
            }}

        async function deleteWorkout(id) {
            if (confirm('Удалить тренировку навсегда?')) {
                await fetch(`${API_URL}/workouts/${id}`, { method: 'DELETE' });
                alert('✅ Тренировка удалена');
                loadWorkouts();
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        checkAuth();
        updateUserInfo();
        loadWorkouts();
    </script>
</body>
</html>
