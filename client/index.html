        <div class="container auth-container">
        <h1>🏋️ Калистеника </h1>
        
        <div id="loginForm" class="form-card">
            <h2>Вход в систему</h2>
            <div id="loginError" class="error hidden"></div>
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button onclick="handleLogin()">Войти</button>
            <div class="register-link">
                <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
            </div>
        </div>
    </div>

    <script>

        function showMessage(message, isError = true) {
            const el = document.getElementById('loginError');
            if (el) {
                el.textContent = message;
                el.classList.remove('hidden');
                if (!isError) {
                    el.classList.add('success');
                    el.classList.remove('error');
                } else {
                    el.classList.add('error');
                    el.classList.remove('success');
                }
                setTimeout(() => el.classList.add('hidden'), 3000);
            }
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('Заполните email и пароль');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (data.status === 'success') {
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);
                    window.location.href = 'workouts.html';
                } else {
                    showMessage(data.message || 'Неверный email или пароль');
                }
            } catch (error) {
                showMessage('Ошибка соединения с сервером');
            }
        }

        if (localStorage.getItem('user_id')) {
            window.location.href = 'workouts.html';
        }
    </script>

    <script>

        function showMessage(message, isSuccess = false) {
            const errorEl = document.getElementById('registerError');
            const successEl = document.getElementById('registerSuccess');
            
            if (isSuccess) {
                successEl.textContent = message;
                successEl.classList.remove('hidden');
                errorEl.classList.add('hidden');
                setTimeout(() => successEl.classList.add('hidden'), 3000);
            } else {
                errorEl.textContent = message;
                errorEl.classList.remove('hidden');
                successEl.classList.add('hidden');
                setTimeout(() => errorEl.classList.add('hidden'), 3000);
            }
        }

        async function handleRegister() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const weight = document.getElementById('regWeight').value;
            const height = document.getElementById('regHeight').value;
            const level = document.getElementById('regLevel').value;

            if (!username || !email || !password) {
                showMessage('Заполните имя, email и пароль');
                return;
            }

            if (password.length < 4) {
                showMessage('Пароль должен быть не менее 4 символов');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password,
                        weight: weight || null,
                        height: height || null,
                        experience_level: level})
                });
                const data = await response.json();

                if (data.status === 'success') {
                    showMessage('Регистрация успешна! Перенаправляем на вход...', true);
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showMessage(data.message || 'Ошибка регистрации. Email может быть занят.');
                }
            } catch (error) {
                showMessage('Ошибка соединения с сервером');
            }
        }

        if (localStorage.getItem('user_id')) {
            window.location.href = 'workouts.html';
        }
    </script>

    <script src="script.js"></script>
    <script>
        const API_URL = 'http://localhost/CalisthenicsAPI/server/index.php';

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');

            if (!email || !password) {
                errorDiv.textContent = 'Заполните email и пароль';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (data.status) {
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('role', data.role);
                    window.location.href = 'workouts.html';
                } else {
                    errorDiv.textContent = data.message || 'Неверный email или пароль';
                    errorDiv.classList.remove('hidden');
                }
            } catch(e) {
                errorDiv.textContent = 'Ошибка соединения';
                errorDiv.classList.remove('hidden');
            }
        }

        async function register() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const weight = document.getElementById('regWeight').value;
            const height = document.getElementById('regHeight').value;
            const level = document.getElementById('regLevel').value;
            const errorDiv = document.getElementById('registerError');

            if (!username || !email || !password) {
                errorDiv.textContent = 'Заполните имя, email и пароль';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, weight, height, experience_level: level })
                });
                const data = await response.json();

                if (data.status) {
                    showLogin();
                    const successDiv = document.getElementById('loginError');
                    successDiv.textContent = 'Регистрация успешна! Войдите.';
                    successDiv.classList.remove('hidden');
                    successDiv.classList.add('success');
                    setTimeout(() => successDiv.classList.add('hidden'), 3000);
                } else {
                    errorDiv.textContent = data.message || 'Ошибка регистрации';
                    errorDiv.classList.remove('hidden');
                }
            } catch(e) {
                errorDiv.textContent = 'Ошибка соединения';
                errorDiv.classList.remove('hidden');
            }
        }

        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        if (localStorage.getItem('user_id')) {
            window.location.href = './client/workouts.html';
        }
    </script>
